  <rect x="40" y="140" width="8" height="90" rx="2" fill="#8D6E63"/>
  <rect x="120" y="140" width="8" height="90" rx="2" fill="#8D6E63"/>
  <rect x="200" y="140" width="8" height="90" rx="2" fill="#8D6E63"/>
  <rect x="280" y="140" width="8" height="90" rx="2" fill="#8D6E63"/>
  <rect x="360" y="140" width="8" height="90" rx="2" fill="#8D6E63"/>
  <!-- Fence rails -->
  <rect x="40" y="160" width="328" height="6" rx="2" fill="#A1887F"/>
  <rect x="40" y="190" width="328" height="6" rx="2" fill="#A1887F"/>
